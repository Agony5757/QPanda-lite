name: Pytest Coverage

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.py'
      - '**.cpp'
      - '**.cc'
      - '**.c'
      - '**.h'
      - '**.hpp'
      - '**.hxx'
      - '**/CMakeLists.txt'
      - '**.cmake'
      - 'setup.py'
      - 'pyproject.toml'
      - '.github/workflows/pytest_coverage.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.py'
      - '**.cpp'
      - '**.cc'
      - '**.c'
      - '**.h'
      - '**.hpp'
      - '**.hxx'
      - '**/CMakeLists.txt'
      - '**.cmake'
      - 'setup.py'
      - 'pyproject.toml'
      - '.github/workflows/pytest_coverage.yml'

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: 'true'

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install package (with all optional dependencies)
      run: |
        pip uninstall qpandalite -y 2>/dev/null || true
        rm -rf build/ dist/ *.egg-info qpandalite.egg-info
        pip install ".[all]" --no-cache-dir --no-build-isolation

    - name: Install test dependencies
      run: pip install pytest pytest-cov

    - name: Run tests with coverage
      run: pytest qpandalite/test/ --cov=qpandalite --cov-report=term-missing --cov-report=xml -v

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: coverage-report
        path: coverage.xml

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
